name: Deploy to GitHub Pages (static fallback only)

# Projektet deployas normalt till Vercel (full Next.js med API-routes).
# Denna workflow bygger en statisk export till GitHub Pages — kör BARA om
# du manuellt vill publicera den statiska versionen (utan bokningssystem).
# Aktiveras endast via "Run workflow"-knappen i Actions-fliken.
on:
  workflow_dispatch:

# Behörigheter som GitHub Pages-deployment kräver
permissions:
  contents: read
  pages: write
  id-token: write

# Tillåt bara en samtidig deploy; avbryt pågående om ny push kommer
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Detect BASE_PATH
        id: pages
        uses: actions/configure-pages@v5
        with:
          # Sätter BASE_PATH-variabeln baserat på repo-typ.
          # För en projektsite (<user>.github.io/<repo>) blir BASE_PATH = "/<repo>".
          # För en usersite (<user>.github.io) blir BASE_PATH tom.
          static_site_generator: next

      - name: Install dependencies
        # --no-frozen-lockfile tillåter att lockfilen uppdateras om package.json ändrats.
        # Byt till --frozen-lockfile när lockfilen är stabil i produktion.
        run: pnpm install --no-frozen-lockfile

      - name: Build (Next.js static export)
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
          STATIC_EXPORT: "true"
        run: pnpm build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
